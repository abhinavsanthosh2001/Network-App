name: network_scanner
description: A Flutter network scanner and Wi-Fi analyzer app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Networking
  http: ^1.1.2
  dio: ^5.4.0
  network_info_plus: ^5.0.1
  connectivity_plus: ^5.0.2
  
  # Permissions
  permission_handler: ^11.1.0
  
  # UI & Charts
  fl_chart: ^0.65.0
  
  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
